<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbedAppSDK.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9ff; padding: 20px; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; border-bottom: 2px solid #e8ecff; padding-bottom: 10px; }
        .ai-badge { background: linear-gradient(135deg,#667eea,#764ba2); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .lead-info { background: white; border-radius: 10px; padding: 12px; margin-bottom: 12px; border: 1px solid #e8ecff; font-size: 12px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .info-item { color: #4a5568; }
        .info-item b { color: #2d3748; }
        .quick-prompts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .qp-btn { padding: 5px 12px; border: 1.5px solid #667eea; border-radius: 20px; background: white; color: #667eea; cursor: pointer; font-size: 11px; }
        .qp-btn:hover { background: #667eea; color: white; }
        .chat-container { background: white; border-radius: 10px; border: 1px solid #e8ecff; overflow: hidden; }
        .chat-messages { height: 250px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
        .msg.user { background: linear-gradient(135deg,#667eea,#764ba2); color: white; align-self: flex-end; }
        .msg.ai { background: #f0f4ff; color: #2d3748; align-self: flex-start; white-space: pre-wrap; }
        .msg.loading { background: #f0f4ff; color: #667eea; align-self: flex-start; font-style: italic; }
        .input-row { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #e8ecff; }
        .msg-input { flex: 1; padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 13px; outline: none; }
        .msg-input:focus { border-color: #667eea; }
        .send-btn { padding: 8px 18px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .send-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="header">
    <div class="ai-badge">🤖 AI Assistant</div>
    <div id="leadTitle" style="font-weight:600; color:#2d3748;">Connecting to Zoho...</div>
</div>

<div class="lead-info">
    <div class="info-grid" id="infoGrid">
        <div class="info-item">Waiting for lead data...</div>
    </div>
</div>

<div class="quick-prompts">
    <button class="qp-btn" onclick="quickAsk('Analyze this lead and suggest best next action')">📊 Analyze</button>
    <button class="qp-btn" onclick="quickAsk('Draft a follow-up email for this lead')">✉️ Email</button>
    <button class="qp-btn" onclick="quickAsk('What are key risks and opportunities?')">⚠️ Risk</button>
    <button class="qp-btn" onclick="quickAsk('Give 3 talking points for next call')">💬 Points</button>
    <button class="qp-btn" onclick="quickAsk('Will this lead likely convert? Give probability')">🎯 Convert?</button>
</div>

<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        <div class="msg ai">👋 Hi! I'm your AI assistant. Ask me anything about this lead!</div>
    </div>
    <div class="input-row">
        <input type="text" class="msg-input" id="msgInput" 
               placeholder="Ask about this lead..."
               onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send ➤</button>
    </div>
</div>

<script>
    var NGROK_URL = "https://grey-nonesurient-jaquelyn.ngrok-free.dev";
    var leadData = {};

    function addMessage(text, type) {
        var container = document.getElementById('chatMessages');
        var div = document.createElement('div');
        div.className = 'msg ' + type;
        if(type === 'loading') div.id = 'loadingMsg';
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function buildContext() {
        if(!leadData || !leadData.Full_Name) {
            return "Lead data not available yet. Please answer generally.";
        }
        return "Lead Name: " + (leadData.Full_Name || 'N/A') +
               "\nCompany: " + (leadData.Company || 'N/A') +
               "\nLead Source: " + (leadData.Lead_Source || 'N/A') +
               "\nBudget: " + (leadData.Budget || 'N/A') +
               "\nTimeline: " + (leadData.Timeline || 'N/A') +
               "\nRequirement Type: " + (leadData.Requirement_Type || 'N/A') +
               "\nLead Score: " + (leadData.Lead_Score || 'N/A') +
               "\nPriority: " + (leadData.Priority || 'N/A') +
               "\nStatus: " + (leadData.Lead_Status || 'N/A') +
               "\nEmail: " + (leadData.Email || 'N/A');
    }

    function callOllama(question) {
        var btn = document.getElementById('sendBtn');
        btn.disabled = true;

        addMessage(question, 'user');
        addMessage('🤖 Thinking...', 'loading');

        var prompt = "You are a CRM sales assistant. " +
            "Analyze this lead and answer the question.\n\n" +
            "LEAD DATA:\n" + buildContext() +
            "\n\nQUESTION: " + question +
            "\n\nBe specific, concise and actionable. Max 4 lines.";

        fetch(NGROK_URL + "/api/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "true"
            },
            body: JSON.stringify({
                model: "llama3.2",
                prompt: prompt,
                stream: false,
                options: { temperature: 0.3, num_predict: 200 }
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var loading = document.getElementById('loadingMsg');
            if(loading) loading.remove();
            addMessage(data.response || "No response from AI", 'ai');
        })
        .catch(function(err) {
            var loading = document.getElementById('loadingMsg');
            if(loading) loading.remove();
            addMessage("❌ Error: " + err.message + 
                "\nCheck: Ollama + Ngrok running?", 'ai');
        })
        .finally(function() {
            btn.disabled = false;
        });
    }

    function sendMsg() {
        var input = document.getElementById('msgInput');
        var question = input.value.trim();
        if(!question) return;
        input.value = '';
        callOllama(question);
    }

    function quickAsk(prompt) {
        callOllama(prompt);
    }

    // ZOHO SDK Initialization
    ZOHO.embeddedApp.on("PageLoad", function(data) {
        console.log("PageLoad event:", data);
        document.getElementById('leadTitle').innerText = "Loading...";

        ZOHO.CRM.API.getRecord({
            Entity: data.Entity,
            RecordID: data.EntityId
        }).then(function(response) {
            console.log("Record response:", response);
            if(response.data && response.data.length > 0) {
                leadData = response.data[0];

                // Update header
                document.getElementById('leadTitle').innerText = 
                    (leadData.Full_Name || 'Lead') + 
                    (leadData.Company ? ' — ' + leadData.Company : '');

                // Update info grid
                var grid = document.getElementById('infoGrid');
                grid.innerHTML = [
                    ['Source', leadData.Lead_Source],
                    ['Budget', leadData.Budget ? '₹'+leadData.Budget : 'N/A'],
                    ['Score', leadData.Lead_Score || 'N/A'],
                    ['Priority', leadData.Priority || 'N/A'],
                    ['Timeline', leadData.Timeline || 'N/A'],
                    ['Status', leadData.Lead_Status || 'N/A']
                ].map(function(f) {
                    return '<div class="info-item"><b>' + f[0] + ':</b> ' + 
                           (f[1] || 'N/A') + '</div>';
                }).join('');

                // Welcome message with lead name
                var container = document.getElementById('chatMessages');
                container.innerHTML = '';
                addMessage('✅ Context loaded for ' + leadData.Full_Name + 
                    '. Ask me anything about this lead!', 'ai');

            } else {
                document.getElementById('leadTitle').innerText = "Lead Data Unavailable";
                document.getElementById('infoGrid').innerHTML = 
                    '<div>Could not load lead data</div>';
            }
        }).catch(function(err) {
            console.error("API Error:", err);
            document.getElementById('leadTitle').innerText = "API Error";
        });
    });

    ZOHO.embeddedApp.init();
</script>
</body>
</html>
