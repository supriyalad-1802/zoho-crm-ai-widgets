<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbedAppSDK.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9ff; padding: 20px; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 2px solid #e8ecff; padding-bottom: 10px;}
        .ai-badge { background: linear-gradient(135deg,#667eea,#764ba2); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .lead-info { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #e8ecff; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .chat-container { background: white; border-radius: 10px; border: 1px solid #e8ecff; overflow: hidden; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 13px; }
        .msg.user { background: #667eea; color: white; align-self: flex-end; }
        .msg.ai { background: #f0f4ff; color: #2d3748; align-self: flex-start; white-space: pre-wrap; }
        .input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e8ecff; }
        .msg-input { flex: 1; padding: 8px; border: 1px solid #e2e8f0; border-radius: 20px; }
        .send-btn { padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="ai-badge">🤖 AI Assistant</div>
        <div id="leadTitle" style="font-weight:600;">Connecting to Zoho...</div>
    </div>
    <div class="lead-info">
        <div class="info-grid" id="infoGrid">Waiting for lead data...</div>
    </div>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-row">
            <input type="text" class="msg-input" id="msgInput" placeholder="Ask about this lead...">
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
        </div>
    </div>

<script>
    var NGROK_URL = "https://grey-nonesurient-jaquelyn.ngrok-free.dev";
    var leadData = {};

    // THIS IS THE CRITICAL INITIALIZATION BLOCK
    ZOHO.embeddedApp.on("PageLoad", function(data) {
        ZOHO.CRM.API.getRecord({
            Entity: data.Entity,
            RecordID: data.EntityId
        }).then(function(response) {
            leadData = response.data[0];
            document.getElementById('leadTitle').innerText = leadData.Full_Name || "Lead Analysis";
            document.getElementById('infoGrid').innerHTML = "Ready to analyze " + (leadData.Full_Name || "this lead");
        });
    });
    ZOHO.embeddedApp.init();

    function addMessage(text, type) {
        var div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        document.getElementById('chatMessages').appendChild(div);
        return div;
    }

    async function sendMsg() {
        var input = document.getElementById('msgInput');
        var question = input.value;
        if(!question) return;
        
        addMessage(question, 'user');
        var loading = addMessage("Thinking...", 'ai');
        input.value = "";

        try {
            const response = await fetch(NGROK_URL + "/api/generate", {
                method: "POST",
                // Removing custom headers to bypass CORS preflight
                body: JSON.stringify({
                    model: "llama3.2",
                    prompt: "Lead: " + JSON.stringify(leadData) + "\nQuestion: " + question,
                    stream: false
                })
            });
            const data = await response.json();
            loading.innerText = data.response;
        } catch (err) {
            loading.innerText = "Error: " + err.message;
        }
    }
</script>
</body>
</html>
