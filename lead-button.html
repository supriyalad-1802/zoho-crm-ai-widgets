<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f8f9ff;padding:15px;}
        .header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #e8ecff;}
        .badge{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
        .title{font-weight:600;color:#2d3748;font-size:14px;}
        .lead-box{background:white;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #e8ecff;font-size:11px;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
        .grid-item{color:#4a5568;}
        .grid-item b{color:#2d3748;}
        .qbtns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
        .qbtn{padding:4px 10px;border:1.5px solid #667eea;border-radius:15px;background:white;color:#667eea;cursor:pointer;font-size:11px;}
        .qbtn:hover{background:#667eea;color:white;}
        .chatbox{background:white;border-radius:8px;border:1px solid #e8ecff;overflow:hidden;}
        .msgs{height:220px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
        .msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5;}
        .user{background:linear-gradient(135deg,#667eea,#764ba2);color:white;align-self:flex-end;}
        .ai{background:#f0f4ff;color:#2d3748;align-self:flex-start;white-space:pre-wrap;}
        .loading{background:#f0f4ff;color:#667eea;align-self:flex-start;font-style:italic;}
        .inputrow{display:flex;gap:6px;padding:8px;border-top:1px solid #e8ecff;}
        .inp{flex:1;padding:7px 12px;border:1px solid #e2e8f0;border-radius:15px;font-size:12px;outline:none;}
        .inp:focus{border-color:#667eea;}
        .sbtn{padding:7px 14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:15px;cursor:pointer;font-size:12px;}
        .sbtn:disabled{opacity:0.5;}
    </style>
</head>
<body>

<div class="header">
    <div class="badge">🤖 AI</div>
    <div class="title" id="leadTitle">Loading...</div>
</div>

<div class="lead-box">
    <div class="grid" id="leadGrid">
        <div class="grid-item">Fetching lead data...</div>
    </div>
</div>

<div class="qbtns">
    <button class="qbtn" id="btn1">📊 Analyze</button>
    <button class="qbtn" id="btn2">✉️ Draft Email</button>
    <button class="qbtn" id="btn3">⚠️ Risks</button>
    <button class="qbtn" id="btn4">💬 Talking Points</button>
    <button class="qbtn" id="btn5">🎯 Convert?</button>
</div>

<div class="chatbox">
    <div class="msgs" id="msgs">
        <div class="msg ai">👋 Hi! Ask me anything about this lead.</div>
    </div>
    <div class="inputrow">
        <input class="inp" id="inp" type="text" placeholder="Type your question...">
        <button class="sbtn" id="sbtn">Send ➤</button>
    </div>
</div>

<script>
var NGROK = "https://grey-nonesurient-jaquelyn.ngrok-free.dev";
var MODEL = "llama3.2";
var lead = {};

function addMsg(text, type) {
    var c = document.getElementById('msgs');
    var d = document.createElement('div');
    d.className = 'msg ' + type;
    if(type === 'loading') d.id = 'loadMsg';
    d.innerText = text;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

function removeLoading() {
    var l = document.getElementById('loadMsg');
    if(l) l.remove();
}

function getContext() {
    if(!lead || !lead.Full_Name) {
        return "No lead context. Answer generally.";
    }
    return "Name: " + (lead.Full_Name||'N/A') +
        "\nCompany: " + (lead.Company||'N/A') +
        "\nSource: " + (lead.Lead_Source||'N/A') +
        "\nBudget: " + (lead.Budget||'N/A') +
        "\nTimeline: " + (lead.Timeline||'N/A') +
        "\nRequirement: " + (lead.Requirement_Type||'N/A') +
        "\nScore: " + (lead.Lead_Score||'N/A') +
        "\nPriority: " + (lead.Priority||'N/A') +
        "\nStatus: " + (lead.Lead_Status||'N/A');
}

function askAI(question) {
    if(!question || !question.trim()) return;
    document.getElementById('sbtn').disabled = true;
    document.getElementById('inp').value = '';
    addMsg(question, 'user');
    addMsg('🤖 Thinking...', 'loading');
    var prompt = "You are a CRM sales assistant. " +
        "Lead data:\n" + getContext() +
        "\n\nQuestion: " + question +
        "\n\nAnswer concisely in 3-4 lines.";
    fetch(NGROK + "/api/generate?ngrok-skip-browser-warning=true", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            model: MODEL,
            prompt: prompt,
            stream: false,
            options: {temperature: 0.3, num_predict: 200}
        })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
        removeLoading();
        addMsg(d.response || "No response", 'ai');
    })
    .catch(function(e){
        removeLoading();
        addMsg("❌ " + e.message, 'ai');
    })
    .finally(function(){
        document.getElementById('sbtn').disabled = false;
    });
}

// Button events
document.getElementById('sbtn').addEventListener('click', function(){
    askAI(document.getElementById('inp').value);
});
document.getElementById('inp').addEventListener('keydown', function(e){
    if(e.key === 'Enter') askAI(this.value);
});
document.getElementById('btn1').addEventListener('click', function(){
    askAI('Analyze this lead and suggest best next action');
});
document.getElementById('btn2').addEventListener('click', function(){
    askAI('Draft a short follow-up email for this lead');
});
document.getElementById('btn3').addEventListener('click', function(){
    askAI('What are the key risks with this lead?');
});
document.getElementById('btn4').addEventListener('click', function(){
    askAI('Give 3 talking points for my next call');
});
document.getElementById('btn5').addEventListener('click', function(){
    askAI('Will this lead convert? Give probability');
});

// ZOHO SDK
function loadLeadData() {
    ZOHO.embeddedApp.on("PageLoad", function(data) {
        console.log("PageLoad:", data);
        var entityId = data.EntityId || data.recordId;
        var entity = data.Entity || data.module;
        if(!entityId) {
            document.getElementById('leadTitle').innerText = 'No Record ID';
            return;
        }
        ZOHO.CRM.API.getRecord({
            Entity: entity,
            RecordID: entityId
        }).then(function(res) {
            console.log("Record:", res);
            if(res.data && res.data.length > 0) {
                lead = res.data[0];
                document.getElementById('leadTitle').innerText =
                    (lead.Full_Name || 'Lead') +
                    (lead.Company ? ' — ' + lead.Company : '');
                var g = document.getElementById('leadGrid');
                g.innerHTML = [
                    ['Source', lead.Lead_Source],
                    ['Budget', lead.Budget ? '₹'+lead.Budget : 'N/A'],
                    ['Score', lead.Lead_Score || 'N/A'],
                    ['Priority', lead.Priority || 'N/A'],
                    ['Timeline', lead.Timeline || 'N/A'],
                    ['Status', lead.Lead_Status || 'N/A']
                ].map(function(f){
                    return '<div class="grid-item"><b>'+f[0]+':</b> '+(f[1]||'N/A')+'</div>';
                }).join('');
                document.getElementById('msgs').innerHTML = '';
                addMsg('✅ ' + lead.Full_Name + ' loaded! Ask me anything.', 'ai');
            }
        }).catch(function(e){
            console.error("Record fetch error:", e);
            document.getElementById('leadTitle').innerText = 'Fetch Error';
        });
    });
    ZOHO.embeddedApp.init();
}

// Wait for SDK
function waitForZoho() {
    if(typeof ZOHO !== 'undefined' && 
       typeof ZOHO.embeddedApp !== 'undefined') {
        loadLeadData();
    } else {
        setTimeout(waitForZoho, 200);
    }
}

waitForZoho();
</script>

<!-- SDK at bottom -->
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbedAppSDK.min.js"></script>
</body>
</html>
