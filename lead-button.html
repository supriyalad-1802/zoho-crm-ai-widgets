<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f8f9ff;
    padding: 20px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #e8ecff;
  }
  .ai-badge {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .lead-info {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid #e8ecff;
  }
  .lead-info h4 {
    color: #4a5568;
    font-size: 13px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-item {
    font-size: 12px;
    color: #2d3748;
  }
  .info-item span {
    color: #718096;
  }
  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 15px;
  }
  .qp-btn {
    padding: 7px 14px;
    border: 1.5px solid #667eea;
    border-radius: 20px;
    background: white;
    color: #667eea;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .qp-btn:hover {
    background: #667eea;
    color: white;
  }
  .chat-container {
    background: white;
    border-radius: 10px;
    border: 1px solid #e8ecff;
    overflow: hidden;
  }
  .chat-messages {
    height: 280px;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg.user {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    background: #f0f4ff;
    color: #2d3748;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    white-space: pre-wrap;
  }
  .msg.loading {
    background: #f0f4ff;
    color: #667eea;
    align-self: flex-start;
  }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #e8ecff;
    background: #fafbff;
  }
  .msg-input {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border 0.2s;
  }
  .msg-input:focus {
    border-color: #667eea;
  }
  .send-btn {
    padding: 9px 18px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .welcome {
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
    margin-top: 80px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="ai-badge">🤖 AI Assistant</div>
  <div id="leadTitle" style="font-size:15px;font-weight:600;color:#2d3748">
    Loading...
  </div>
</div>

<div class="lead-info">
  <h4>📋 Lead Context</h4>
  <div class="info-grid" id="infoGrid">
    <div class="info-item">Loading lead data...</div>
  </div>
</div>

<div class="quick-prompts">
  <button class="qp-btn" onclick="quickAsk('Analyze this lead and suggest the best next action')">
    📊 Analyze
  </button>
  <button class="qp-btn" onclick="quickAsk('Draft a personalized follow-up email for this lead')">
    ✉️ Draft Email
  </button>
  <button class="qp-btn" onclick="quickAsk('What are the key risks and opportunities with this lead?')">
    ⚠️ Risk & Opportunity
  </button>
  <button class="qp-btn" onclick="quickAsk('Give me 3 specific talking points for my next call')">
    💬 Talking Points
  </button>
  <button class="qp-btn" onclick="quickAsk('Is this lead likely to convert? Give probability and reasoning')">
    🎯 Convert Probability
  </button>
</div>

<div class="chat-container">
  <div class="chat-messages" id="chatMessages">
    <div class="welcome">
      💡 Select a quick prompt or type your question below
    </div>
  </div>
  <div class="input-row">
    <input type="text" class="msg-input" id="msgInput"
      placeholder="Ask anything about this lead..."
      onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">
      Send ➤
    </button>
  </div>
</div>

<script src="https://js.zohostatic.com/zohocrm/javascript/v2.0/js/zcrmsdk.js">
</script>
<script>
  var leadContext = {};
  var NGROK_URL = "https://ngrok http 11434 --domain=grey-nonesurient-jaquelyn.ngrok-free.dev"; // UPDATE THIS
  var chatHistory = [];

  // Initialize and load record data
  ZOHO.embeddedApp.on("PageLoad", function(data) {
    var entity = data.Entity;
    var recordId = data.EntityId;

    ZOHO.CRM.API.getRecord({
      Entity: entity,
      RecordID: recordId
    }).then(function(response) {
      if(response.data && response.data.length > 0) {
        var rec = response.data[0];
        leadContext = rec;
        updateLeadInfo(rec);
      }
    });
  });

  ZOHO.embeddedApp.init();

  function updateLeadInfo(rec) {
    // Update title
    document.getElementById('leadTitle').innerText =
      (rec.Full_Name || rec.Deal_Name || 'Record') +
      ' — ' + (rec.Company || '');

    // Update info grid
    var grid = document.getElementById('infoGrid');
    var fields = [
      ['Source', rec.Lead_Source],
      ['Budget', rec.Budget ? '₹'+rec.Budget : 'N/A'],
      ['Score', rec.Lead_Score || 'N/A'],
      ['Priority', rec.Priority || 'N/A'],
      ['Timeline', rec.Timeline || 'N/A'],
      ['Status', rec.Lead_Status || rec.Stage || 'N/A']
    ];

    grid.innerHTML = fields.map(function(f) {
      return '<div class="info-item"><span>' +
        f[0] + ':</span> ' + (f[1] || 'N/A') + '</div>';
    }).join('');
  }

  function buildContext() {
    if(!leadContext) return "No record context available";
    return "Lead Name: " + (leadContext.Full_Name || 'N/A') +
      "\nCompany: " + (leadContext.Company || 'N/A') +
      "\nLead Source: " + (leadContext.Lead_Source || 'N/A') +
      "\nBudget: " + (leadContext.Budget || 'N/A') +
      "\nTimeline: " + (leadContext.Timeline || 'N/A') +
      "\nRequirement: " + (leadContext.Requirement_Type || 'N/A') +
      "\nLead Score: " + (leadContext.Lead_Score || 'N/A') +
      "\nPriority: " + (leadContext.Priority || 'N/A') +
      "\nStatus: " + (leadContext.Lead_Status || 'N/A') +
      "\nDuplicate Flag: " + (leadContext.Duplicate_Flag || 'No');
  }

  function quickAsk(prompt) {
    document.getElementById('msgInput').value = prompt;
    sendMsg();
  }

  function addMessage(text, type) {
    var container = document.getElementById('chatMessages');
    // Remove welcome message
    var welcome = container.querySelector('.welcome');
    if(welcome) welcome.remove();

    var div = document.createElement('div');
    div.className = 'msg ' + type;
    div.id = type === 'loading' ? 'loadingMsg' : '';
    div.innerText = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function sendMsg() {
    var input = document.getElementById('msgInput');
    var question = input.value.trim();
    if(!question) return;

    var btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';

    // Add user message
    addMessage(question, 'user');

    // Add loading
    addMessage('🤖 Thinking...', 'loading');

    // Build prompt with context
    var prompt = "You are an expert CRM sales assistant. " +
      "Analyze the following lead and answer the question.\n\n" +
      "LEAD CONTEXT:\n" + buildContext() +
      "\n\nQUESTION: " + question +
      "\n\nProvide a clear, actionable response in 3-5 lines. " +
      "Be specific to this lead's data.";

    // Call Ollama
    fetch(NGROK_URL + "/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ngrok-skip-browser-warning": "true"
      },
      body: JSON.stringify({
        model: "llama3.2",
        prompt: prompt,
        stream: false,
        options: {
          temperature: 0.3,
          num_predict: 250
        }
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var loadingMsg = document.getElementById('loadingMsg');
      if(loadingMsg) loadingMsg.remove();
      addMessage(data.response || "No response", 'ai');
    })
    .catch(function(err) {
      var loadingMsg = document.getElementById('loadingMsg');
      if(loadingMsg) loadingMsg.remove();
      addMessage(
        "❌ AI unavailable. Check:\n" +
        "1. Ollama running (ollama serve)\n" +
        "2. Ngrok running\n" +
        "3. URL updated in widget\n" +
        "Error: " + err.message,
        'ai'
      );
    })
    .finally(function() {
      btn.disabled = false;
    });
  }
</script>
</body>
</html>
