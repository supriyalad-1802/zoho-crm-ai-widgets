<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
    padding: 25px;
  }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }
  .page-header h2 {
    color: #2d3748;
    font-size: 22px;
  }
  .badge {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 25px;
  }
  .stat-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    text-align: center;
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: #667eea;
  }
  .stat-card .label {
    font-size: 12px;
    color: #718096;
    margin-top: 4px;
  }
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .panel {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .panel h3 {
    color: #2d3748;
    font-size: 15px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .analysis-prompts {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
  }
  .ap-btn {
    padding: 10px 15px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    background: #f8f9ff;
    cursor: pointer;
    font-size: 13px;
    color: #4a5568;
    text-align: left;
    transition: all 0.2s;
  }
  .ap-btn:hover {
    border-color: #667eea;
    background: #eef2ff;
    color: #667eea;
  }
  .response-box {
    background: #f8f9ff;
    border: 1px solid #e8ecff;
    border-radius: 8px;
    padding: 15px;
    min-height: 200px;
    font-size: 13px;
    color: #2d3748;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .custom-query {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  .custom-query input {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
  }
  .custom-query input:focus {
    border-color: #667eea;
  }
  .ask-btn {
    padding: 9px 18px;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .loading-text {
    color: #667eea;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="page-header">
  <h2>📊 AI Lead Performance Intelligence</h2>
  <span class="badge">🤖 Powered by Llama 3.2</span>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="num" id="totalLeads">--</div>
    <div class="label">Total Leads</div>
  </div>
  <div class="stat-card">
    <div class="num" id="highPriority">--</div>
    <div class="label">High Priority</div>
  </div>
  <div class="stat-card">
    <div class="num" id="avgScore">--</div>
    <div class="label">Avg Lead Score</div>
  </div>
  <div class="stat-card">
    <div class="num" id="duplicates">--</div>
    <div class="label">Duplicates</div>
  </div>
</div>

<div class="main-grid">
  <!-- Quick Analysis -->
  <div class="panel">
    <h3>⚡ Quick Analysis</h3>
    <div class="analysis-prompts">
      <button class="ap-btn"
        onclick="analyzeLeads('Which lead sources are performing best? Rank them.')">
        🏆 Best Performing Sources
      </button>
      <button class="ap-btn"
        onclick="analyzeLeads('Which leads are most likely to convert this week? List top 3.')">
        🎯 This Week\'s Top Leads
      </button>
      <button class="ap-btn"
        onclick="analyzeLeads('What is the overall pipeline health? Any red flags?')">
        🚦 Pipeline Health Check
      </button>
      <button class="ap-btn"
        onclick="analyzeLeads('Which leads need immediate follow-up? Why?')">
        ⏰ Urgent Follow-ups
      </button>
      <button class="ap-btn"
        onclick="analyzeLeads('Summarize the sales team performance based on lead data')">
        👥 Team Performance Summary
      </button>
    </div>
    <div class="custom-query">
      <input type="text" id="customQuery"
        placeholder="Ask about overall lead performance..."
        onkeydown="if(event.key==='Enter') customAnalysis()">
      <button class="ask-btn" onclick="customAnalysis()">Ask AI</button>
    </div>
  </div>

  <!-- AI Response -->
  <div class="panel">
    <h3>🤖 AI Analysis</h3>
    <div class="response-box" id="aiResponse">
      Select an analysis type or ask a custom question to get AI insights about your lead pipeline...
    </div>
  </div>
</div>

<script src="https://js.zohostatic.com/zohocrm/javascript/v2.0/js/zcrmsdk.js">
</script>
<script>
  var NGROK_URL = "https://grey-nonesurient-jaquelyn.ngrok-free.dev"; // UPDATE THIS
  var allLeadsData = [];

  ZOHO.embeddedApp.on("PageLoad", function(data) {
    loadAllLeads();
  });

  ZOHO.embeddedApp.init();

  function loadAllLeads() {
    ZOHO.CRM.API.getAllRecords({
      Entity: "Leads",
      sort_order: "desc",
      per_page: 50,
      page: 1
    }).then(function(response) {
      if(response.data) {
        allLeadsData = response.data;
        updateStats(response.data);
      }
    });
  }

  function updateStats(leads) {
    document.getElementById('totalLeads').innerText =
      leads.length;

    var highP = leads.filter(function(l) {
      return l.Priority === 'High';
    }).length;
    document.getElementById('highPriority').innerText = highP;

    var scores = leads
      .map(function(l) { return parseInt(l.Lead_Score) || 0; })
      .filter(function(s) { return s > 0; });
    var avg = scores.length > 0 ?
      Math.round(scores.reduce(function(a,b){return a+b;},0) / scores.length) : 0;
    document.getElementById('avgScore').innerText = avg;

    var dups = leads.filter(function(l) {
      return l.Duplicate_Flag === true;
    }).length;
    document.getElementById('duplicates').innerText = dups;
  }

  function buildLeadsSummary() {
    if(!allLeadsData.length) return "No leads data available";

    var summary = "Total Leads: " + allLeadsData.length + "\n\n";

    // Source breakdown
    var sources = {};
    allLeadsData.forEach(function(l) {
      var src = l.Lead_Source || 'Unknown';
      sources[src] = (sources[src] || 0) + 1;
    });
    summary += "LEADS BY SOURCE:\n";
    Object.keys(sources).forEach(function(s) {
      summary += "- " + s + ": " + sources[s] + "\n";
    });

    // Priority breakdown
    var priorities = {High:0, Medium:0, Low:0};
    allLeadsData.forEach(function(l) {
      var p = l.Priority || 'Low';
      priorities[p] = (priorities[p] || 0) + 1;
    });
    summary += "\nPRIORITY BREAKDOWN:\n";
    Object.keys(priorities).forEach(function(p) {
      summary += "- " + p + ": " + priorities[p] + "\n";
    });

    // Top leads by score
    var topLeads = allLeadsData
      .filter(function(l) { return l.Lead_Score > 50; })
      .slice(0, 5);
    if(topLeads.length > 0) {
      summary += "\nTOP HIGH-SCORE LEADS:\n";
      topLeads.forEach(function(l) {
        summary += "- " + (l.Full_Name||'N/A') +
          " | Score:" + (l.Lead_Score||0) +
          " | Source:" + (l.Lead_Source||'N/A') +
          " | Budget:" + (l.Budget||'N/A') + "\n";
      });
    }

    return summary;
  }

  function analyzeLeads(question) {
    var responseBox = document.getElementById('aiResponse');
    responseBox.innerHTML =
      '<span class="loading-text">🤖 Analyzing your pipeline...</span>';

    var prompt = "You are an expert sales analytics AI. " +
      "Analyze this CRM pipeline data and answer the question.\n\n" +
      "PIPELINE DATA:\n" + buildLeadsSummary() +
      "\n\nQUESTION: " + question +
      "\n\nProvide specific, data-driven insights. " +
      "Be concise but actionable. Use bullet points where helpful.";

    callOllama(prompt, responseBox);
  }

  function customAnalysis() {
    var query = document.getElementById('customQuery').value.trim();
    if(!query) return;
    document.getElementById('customQuery').value = '';
    analyzeLeads(query);
  }

  function callOllama(prompt, responseBox) {
    fetch(NGROK_URL + "/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ngrok-skip-browser-warning": "true"
      },
      body: JSON.stringify({
        model: "llama3.2",
        prompt: prompt,
        stream: false,
        options: {
          temperature: 0.3,
          num_predict: 350
        }
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      responseBox.innerText =
        data.response || "No response received";
    })
    .catch(function(err) {
      responseBox.innerText =
        "❌ AI Error: " + err.message +
        "\n\nCheck:\n• ollama serve running\n" +
        "• ngrok http 11434 running\n" +
        "• NGROK_URL updated in widget";
    });
  }
</script>
</body>
</html>
